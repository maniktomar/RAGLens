services:
  backend:
    build:
      context: ./backend
    container_name: raglens-backend
    environment:
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      USE_OPENAI_EMBEDDINGS: ${USE_OPENAI_EMBEDDINGS:-false}
    ports:
      - "8001:8000"
    volumes:
      - raglens_data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: raglens-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  raglens_data:
